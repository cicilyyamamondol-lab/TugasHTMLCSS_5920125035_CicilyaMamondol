<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>opacity</title>
</head>
<style>
    p one {
        background-color: rgb(0,0,0);
        opacity: 0.5;
    }
    
    p two {
        background-color: rgb(0,0,0);
        background-color: rgba(0,0,0,0.5);
    }
    body{
        background-color: #c0c0c0;
    }
    .wrapper{
        position: relative;
        width: 150px;
        height: 150px;
        display: inline-block;
        margin: 20px;
        background-color: #b5114a;
    }
    .bg-magenta{
        position: absolute;
        top: 20px;
        left: 20px;
        width:100px;
        height: 100px;
        background-color: #b5114a;

    }
    p.one,p.two{
         position: absolute;
        top: 60px;
        left: 60px;
        width:100px;
        height: 100px;
        margin: 0;


    }
</style>
<body>
    <div class="wrapper">
        <div class="bg-magenta"></div>
        <p class="two"></p>
    </div>
</body>
</html>
