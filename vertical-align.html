<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vertical align</title>
    <style>
        #six-months {
vertical-align: text-top;}
#one-year {
vertical-align: baseline;}
#two-years {
vertical-align: text-bottom;}
    </style>
</head>
<body>
    <h1>Briard Life Stages</h1>

    <p id="six-months"><img src="dog.jpeg" width="70" height="70">Six Months</p>
    <p id="One year"><img src="dog.jpeg" width="70" height="70">One Year</p>
    <p id="Two Years"><img src="dog.jpeg" width="70" height="70">Two Years</p>
    </body>
</html>
