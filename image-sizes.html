<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image-Sizes</title>
    <style>
        img.large{
            width: 500px;
            height: 500px;}
        img.medium{
            width: 250px;
            height:250px;}
        img.small{
            width: 100px;
            height: 100px;}
    </style>
</head>
<body>
    <img src="hii.jpeg"
         class="large" alt="Magnolia"/>
    <img src="hi.jpeg"
         class="Medium" alt="Magnolia"/>
    <img src="hiii.jpeg"
         class="small" alt="magnolia"/>
</body>
</html>
